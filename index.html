<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeseNav</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f7; height: 100dvh; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; max-width: 680px; padding: 20px 24px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .header-logo { width: 38px; height: 38px; background: #1d1d1f; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-text h1 { font-size: 17px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
    .header-text p { font-size: 12px; color: #86868b; margin-top: 1px; }
    .chat-container { flex: 1; width: 100%; max-width: 680px; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .welcome { text-align: center; padding: 32px 0 16px; }
    .welcome strong { display: block; font-size: 24px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.5px; margin-bottom: 8px; }
    .welcome p { font-size: 15px; color: #86868b; line-height: 1.5; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .chip { background: white; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; padding: 7px 14px; font-size: 13px; color: #1d1d1f; cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .chip:hover { background: #e8e8ed; }
    .message { display: flex; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { justify-content: flex-end; }
    .message-bubble { max-width: 75%; padding: 10px 15px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; }
    .message.assistant .message-bubble { background: white; color: #1d1d1f; border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.07); }
    .message.user .message-bubble { background: #1d1d1f; color: white; border-radius: 18px 18px 4px 18px; }
    .typing { display: flex; gap: 5px; padding: 13px 16px; background: white; border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.07); width: fit-content; }
    .dot { width: 7px; height: 7px; background: #c7c7cc; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .input-area { width: 100%; max-width: 680px; padding: 12px 24px 28px; }
    .input-wrapper { display: flex; align-items: flex-end; gap: 10px; background: white; border-radius: 26px; padding: 10px 10px 10px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05); }
    textarea { flex: 1; border: none; outline: none; resize: none; font-family: inherit; font-size: 15px; line-height: 1.5; color: #1d1d1f; background: transparent; min-height: 24px; max-height: 120px; }
    textarea::placeholder { color: #aeaeb2; }
    .send-btn { width: 34px; height: 34px; background: #1d1d1f; border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.75; }
    .send-btn:disabled { opacity: 0.25; cursor: default; }
    .send-btn svg { width: 15px; height: 15px; fill: white; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-logo">&#x1F9ED;</div>
  <div class="header-text">
    <h1>MeseNaf</h1>
    <p>Tu guia en Mesena 22</p>
  </div>
</div>
<div class="chat-container" id="chat">
  <div class="welcome">
    <strong>Hola. Soy MeseNav.</strong>
    <p>Preguntame lo que necesites sobre la oficina.</p>
    <div class="chips">
      <button class="chip" onclick="sendChip(this)">Como reservo una sala?</button>
      <button class="chip" onclick="sendChip(this)">Donde esta el cafe?</button>
      <button class="chip" onclick="sendChip(this)">Sitios para comer cerca</button>
      <button class="chip" onclick="sendChip(this)">Como funciona el parking?</button>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" placeholder="Pregunta lo que necesites..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
var SYSTEM_PROMPT = "AQUI VA EL SYSTEM PROMPT - SE RELLENA EN LA FASE 4";
var chatEl = document.getElementById("chat");
var inputEl = document.getElementById("input");
var sendBtn = document.getElementById("sendBtn");
var chatHistory = [];

inputEl.addEventListener("input", function() {
  inputEl.style.height = "auto";
  inputEl.style.height = inputEl.scrollHeight + "px";
});

inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener("click", send);

function sendChip(btn) {
  inputEl.value = btn.textContent;
  send();
}

function addMsg(role, text) {
  var d = document.createElement("div");
  d.className = "message " + role;
  d.innerHTML = "<div class=\"message-bubble\">" + text.replace(/\n/g, "<br>") + "</div>";
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  var d = document.createElement("div");
  d.className = "message assistant";
  d.id = "typing";
  d.innerHTML = "<div class=\"typing\"><div class=\"dot\"></div><div class=\"dot\"></div><div class=\"dot\"></div></div>";
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function send() {
  var text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;
  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;
  addMsg("user", text);
  chatHistory.push({ role: "user", content: text });
  showTyping();
  fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1000, system: SYSTEM_PROMPT, messages: chatHistory })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var reply = data.content[0].text;
    var t = document.getElementById("typing");
    if (t) t.remove();
    addMsg("assistant", reply);
    chatHistory.push({ role: "assistant", content: reply });
    sendBtn.disabled = false;
    inputEl.focus();
  })
  .catch(function() {
    var t = document.getElementById("typing");
    if (t) t.remove();
    addMsg("assistant", "Algo ha fallado. Recarga la pagina e intentalo.");
    sendBtn.disabled = false;
  });
}
</script>
</body>
</html>
